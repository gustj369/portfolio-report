services:
  - type: web
    name: portfolio-report-api
    runtime: python
    rootDir: backend
    buildCommand: apt-get update -y && apt-get install -y fonts-nanum || true && pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free

    # 환경변수 — Render 대시보드에서 직접 설정
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false          # Upstash Redis URL (rediss://...)
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY
        sync: false
      - key: R2_SECRET_KEY
        sync: false
      - key: R2_BUCKET
        value: portfolio-reports
      - key: FRONTEND_URL
        sync: false          # Vercel 배포 URL (https://your-app.vercel.app)
      - key: USE_LOCAL_STORAGE
        value: "false"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: REPORT_PRICE_KRW
        value: "0"           # 무료
      - key: TZ
        value: Asia/Seoul    # 서버 시간대 KST 고정 (로그·타임스탬프 혼선 방지)

# ── 로그 모니터링 ─────────────────────────────────────────────────────────────
# Log Drain 설정은 render.yaml 미지원 — Render 대시보드에서 직접 구성:
#   대시보드 → 서비스 선택 → Logs → Log Drains → Add Log Drain
#   지원 대상: Betterstack (https://betterstack.com), Papertrail, Datadog 등
#
# 주요 모니터링 키워드 (로그 알림 설정 시 활용):
#   WARNING  "전체 fallback 실패"   → 시장 데이터 기본값 사용 중
#   WARNING  "PENDING 중복 요청"    → generateReport 중복 호출
#   ERROR    "리포트 생성 실패"      → PDF 생성 에러
#   INFO     "KOSPI 최종값"         → KOSPI fallback 성공 소스 확인
